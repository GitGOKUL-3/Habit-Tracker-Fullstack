<div class="modal-backdrop">
    <div class="modal">
        <h3>Edit Profile</h3>

        <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

        <div class="form-group">
            <label>Avatar</label>
            <div class="avatar-preview">{{ selectedAvatar }}</div>
            <div class="avatar-grid">
                <button *ngFor="let av of avatars" class="avatar-option" [class.selected]="av === selectedAvatar"
                    (click)="selectAvatar(av)">
                    {{ av }}
                </button>
            </div>
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" [(ngModel)]="username" placeholder="Username">
        </div>

        <div class="form-group">
            <label>Bio / Motto</label>
            <textarea [(ngModel)]="bio" placeholder="What keeps you going?" rows="3"></textarea>
            <small>Displayed on your dashboard.</small>
        </div>

        <div class="modal-actions">
            <button class="btn-cancel" (click)="cancel()" [disabled]="isLoading">Cancel</button>
            <button class="btn-save" (click)="save()" [disabled]="isLoading">
                {{ isLoading ? 'Saving...' : 'Save Changes' }}
            </button>
        </div>
    </div>
</div>
